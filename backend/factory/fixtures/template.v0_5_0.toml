# template.toml: the versioned contract between this template and the
# Stagecraft factory (spec 009). The factory reads ONLY this file to learn
# how to stamp, verify, and package an app from this chassis; anything not
# expressed here is not part of the interface.

[template]
name = "enrahitu"
version = "0.1.0"
license = "Apache-2.0"

[contract]
# Contract schema version (semver). The factory pins a compatible range;
# a breaking change to this file's shape bumps the major. v0.2 added the
# optional [requires].toolchain key (spec 018); v0.3 added the [provenance]
# table (spec 012); v0.4 added the scaffold verb (spec 014); v0.5 added the
# react-rr7 frontend flavor (spec 015). Each is a minor bump per spec 009 §3.1.
version = "0.5.0"

[requires]
node = ">=24"
# The packaged build toolchain (spec 018), consumed by a stamped app as a
# devDependency (@enrahitu/toolchain): the vendored Encore build drivers plus
# prebuilt per-platform encore-runtime.node / tsparser-encore binaries. Its
# @enrahitu/hiqlite-native companion carries the prebuilt addon.
toolchain = "^0.1"
# Rust + protoc are template-development requirements only; stamped apps
# consume the prebuilt addon and vendored-runtime artifacts (specs 002/008).

[slots]
# Values the factory substitutes at stamp time.
app_name = { required = true, pattern = "^[a-z][a-z0-9-]*$" }
org = { required = true }
# frontend is a slot, not a fork (spec 009 §3.1). Each allowed value maps to a
# sibling flavor directory the scaffold verb keeps or prunes (spec 014/015):
# vue -> frontend/, react-rr7 -> frontend-react/. The chassis carries every
# flavor; a stamped app carries exactly one.
frontend = { default = "vue", allowed = ["vue", "react-rr7"] }

[verbs]
# Commands the factory runs inside a stamped repo. Exit code is the verdict.
verify = "npm run typecheck && npm test"
package = "scripts/docker-build.sh"
# scaffold (contract v0.4, spec 014): the in-template stamping recipe. Run from
#   the repo root of a fresh clone to turn it into a named app: slot validation,
#   app-name substitution in the manifest and lockfile, provenance-cert
#   placement, derived-truth regeneration, and a README lineage marker. Required
#   flags: --app-name, --org; optional: --frontend, --cert, --stamped-from.
scaffold = "node scripts/stamp.mjs"
# deploy: owned by the Stagecraft fleet service, never by the template.

[provenance]
# Born-with certificate + agentic-posture binding (spec 012, contract v0.3).
# The template owns the cert schema and its validator; the factory emits the
# instance at stamp time. cert_path exists only in stamped repos, never in the
# template itself. Kept out of the verify verb on purpose: cert validation is a
# provenance concern the factory invokes separately, since verify must also
# pass here, where there is no cert.
cert_path = ".stagecraft/born-with.json"
cert_schema = ".stagecraft/born-with.schema.json"
verify = "node scripts/verify-born-with.mjs"
postures = ["none", "assisted", "autonomous"]
