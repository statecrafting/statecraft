# infra/secrets/catalog.toml
#
# The single documented source for every secret and config value the
# statecraft platform (spec 010) needs on the operator host and in the
# cluster. It holds NAMES, DESCRIPTIONS, OWNERSHIP, REQUIRED/OPTIONAL, and the
# CONSUMER of each value. It holds NO VALUES.
#
# From this catalog:
#   - `infra/hetzner/.env.example` is generated (committed, documented).
#   - the operator `.env` at ~/.config/statecrafting/infra/hetzner/.env is
#     validated (missing required keys and unknown keys both fail).
#   - the SOPS-encrypted cluster secrets take their key set (every `secret`
#     key is what Flux decrypts in-cluster).
#   - agreement with spec 002's `infra.config.json` is enforced: every secret
#     Encore injects there must be declared here.
#
# Regenerate / validate with:
#   npm run secrets:example     # rewrite infra/hetzner/.env.example
#   npm run secrets:validate    # validate the operator .env against this
#   npm run secrets:check       # agreement with infra.config.json (CI gate)
#
# provenance is one of:
#   user-supplied     the operator provides it (tokens, domain, upstream creds)
#   generated         minted with crypto/rand or `npm run generate-keys`
#   provider-produced a provider hands it back (GitHub App, rauthy OIDC client)
#   derived           computed from another value (service URLs from DOMAIN)
#
# `group` ties optional keys into an all-or-nothing set: if any member is set,
# every member must be set; if none are set, the group is skipped as optional.

schema_version = 1
domain = "statecraft.ing"  # informational; the live value is DOMAIN in .env

# ---------------------------------------------------------------------------
# User-supplied: the operator provides these.
# ---------------------------------------------------------------------------

[[key]]
name = "DOMAIN"
provenance = "user-supplied"
secret = false
required = true
consumer = "cluster, cert-manager, rauthy, app"
description = "Base apex domain the platform serves under (statecraft.ing). Every service host is a subdomain of it."

[[key]]
name = "LETSENCRYPT_EMAIL"
provenance = "user-supplied"
secret = false
required = true
consumer = "cert-manager"
description = "Registration email for the Let's Encrypt ACME accounts (both ClusterIssuers)."

[[key]]
name = "HCLOUD_TOKEN"
provenance = "user-supplied"
secret = true
required = true
consumer = "hetzner-k3s, hcloud-ccm, hcloud-csi"
description = "Hetzner Cloud API token with read+write on the target project. Provisions nodes, load balancers, and CSI volumes."

[[key]]
name = "CLOUDFLARE_DNS_API_TOKEN"
provenance = "user-supplied"
secret = true
required = true
consumer = "cert-manager (DNS-01 solver)"
description = "Cloudflare API token scoped Zone.DNS:Edit on the statecraft.ing zone. Used by the DNS-01 ACME solver to prove control of every host."

[[key]]
name = "GHCR_PAT"
provenance = "user-supplied"
secret = true
required = true
consumer = "image pull (ghcr), fleet"
description = "GitHub PAT with read:packages for pulling private GHCR images (the control-plane image and stamped app images)."

[[key]]
name = "FLEET_BASE_DOMAIN"
provenance = "user-supplied"
secret = false
required = true
consumer = "fleet"
description = "Base domain fleet places stamped single-container apps under (deployd.xyz). Distinct from DOMAIN, which is the control plane's own."

[[key]]
name = "FLEET_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
consumer = "fleet (restic backups)"
description = "Access key for the Hetzner Object Storage bucket that holds the fleet's restic backups of per-app volumes."

[[key]]
name = "FLEET_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
consumer = "fleet (restic backups)"
description = "Secret key paired with FLEET_S3_ACCESS_KEY_ID."

[[key]]
name = "OBJECT_STORAGE_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
consumer = "encore object_storage"
description = "Access key for the statecraft-encore-object-storage Hetzner bucket, addressed by Encore's s3 object_storage backend. Replaces the dropped in-cluster minio."

[[key]]
name = "OBJECT_STORAGE_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
consumer = "encore object_storage"
description = "Secret key paired with OBJECT_STORAGE_S3_ACCESS_KEY_ID."

[[key]]
name = "RAUTHY_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
consumer = "rauthy (hiqlite S3 backup)"
description = "Access key for the Hetzner Object Storage bucket that holds rauthy's hiqlite database backups."

[[key]]
name = "RAUTHY_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
consumer = "rauthy (hiqlite S3 backup)"
description = "Secret key paired with RAUTHY_S3_ACCESS_KEY_ID."

# Optional SMTP group: rauthy email. All-or-nothing.
[[key]]
name = "SMTP_URL"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "rauthy"
description = "SMTP host for rauthy email (smtp.gmail.com). Hetzner blocks port 465; use 587 with STARTTLS."

[[key]]
name = "SMTP_PORT"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "rauthy"
description = "SMTP port (587 for STARTTLS)."

[[key]]
name = "SMTP_USERNAME"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "rauthy"
description = "SMTP auth username."

[[key]]
name = "SMTP_PASSWORD"
provenance = "user-supplied"
secret = true
required = true
group = "smtp"
consumer = "rauthy"
description = "SMTP auth password (a Gmail app password, not the account password)."

[[key]]
name = "SMTP_FROM"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "rauthy"
description = "From header for platform email (Admin <admin@statecraft.ing>)."

# Optional GitHub upstream OAuth provider (rauthy federated login). All-or-nothing.
[[key]]
name = "GITHUB_UPSTREAM_CLIENT_ID"
provenance = "user-supplied"
secret = false
required = true
group = "github_upstream"
consumer = "rauthy (github upstream provider)"
description = "Client id of the GitHub OAuth App rauthy federates to for GitHub login. Seeded into rauthy via the admin API (rauthy 0.35 stores upstream providers in its DB, not config)."

[[key]]
name = "GITHUB_UPSTREAM_CLIENT_SECRET"
provenance = "user-supplied"
secret = true
required = true
group = "github_upstream"
consumer = "rauthy (github upstream provider)"
description = "Client secret paired with GITHUB_UPSTREAM_CLIENT_ID."

# Optional Google upstream OAuth provider (rauthy federated login). All-or-nothing.
[[key]]
name = "GOOGLE_UPSTREAM_CLIENT_ID"
provenance = "user-supplied"
secret = false
required = true
group = "google_upstream"
consumer = "rauthy (google upstream provider)"
description = "Client id of the Google OAuth client rauthy federates to for Google login."

[[key]]
name = "GOOGLE_UPSTREAM_CLIENT_SECRET"
provenance = "user-supplied"
secret = true
required = true
group = "google_upstream"
consumer = "rauthy (google upstream provider)"
description = "Client secret paired with GOOGLE_UPSTREAM_CLIENT_ID."

# ---------------------------------------------------------------------------
# Generated: minted with crypto/rand or `npm run generate-keys`.
# ---------------------------------------------------------------------------

[[key]]
name = "POSTGRES_PASSWORD"
provenance = "generated"
secret = true
required = true
consumer = "postgres, app (CoreLedger driver)"
description = "Password for the statecraft Postgres role. CoreLedger runs the Postgres driver against it (spec 003)."

[[key]]
name = "SESSION_SECRET"
provenance = "generated"
secret = true
required = true
consumer = "app"
description = "Secret keying the control plane's session cookies."

[[key]]
name = "RAUTHY_RAFT_SECRET"
provenance = "generated"
secret = true
required = true
consumer = "rauthy"
description = "Shared secret for rauthy's embedded hiqlite Raft cluster (SECRET_RAFT / HQL_SECRET_RAFT)."

[[key]]
name = "RAUTHY_API_SECRET"
provenance = "generated"
secret = true
required = true
consumer = "rauthy"
description = "Shared secret for rauthy's hiqlite API (SECRET_API / HQL_SECRET_API)."

[[key]]
name = "RAUTHY_ADMIN_PASSWORD"
provenance = "generated"
secret = true
required = true
consumer = "rauthy (bootstrap admin)"
description = "Plaintext bootstrap password for the rauthy admin account (BOOTSTRAP_ADMIN_PASSWORD_PLAIN). Rotated to a passkey after first login."

[[key]]
name = "RAUTHY_ENC_KEY_ID"
provenance = "generated"
secret = false
required = true
consumer = "rauthy"
description = "Key id of the active rauthy encryption key (ENC_KEY_ACTIVE). Not itself secret; names which key in ENC_KEYS is active."

[[key]]
name = "RAUTHY_ENC_KEY"
provenance = "generated"
secret = true
required = true
consumer = "rauthy"
description = "32-byte base64 rauthy encryption key. ENC_KEYS is assembled as <RAUTHY_ENC_KEY_ID>/<RAUTHY_ENC_KEY>."

[[key]]
name = "HIQLITE_SECRET_RAFT"
provenance = "generated"
secret = true
required = true
consumer = "app (hiqlite)"
description = "Shared secret for the control plane's in-process hiqlite Raft channel."

[[key]]
name = "HIQLITE_SECRET_API"
provenance = "generated"
secret = true
required = true
consumer = "app (hiqlite)"
description = "Shared secret for the control plane's in-process hiqlite API channel."

[[key]]
name = "RESTIC_PASSWORD"
provenance = "generated"
secret = true
required = true
consumer = "fleet (restic backups)"
description = "Restic repository password encrypting the fleet's per-app volume backups."

[[key]]
name = "JWT_PRIVATE_KEY"
provenance = "generated"
secret = true
required = true
consumer = "app (auth)"
description = "RS256 private key (PEM) signing access tokens. Minted by `npm run generate-keys`."

[[key]]
name = "JWT_PUBLIC_KEY"
provenance = "generated"
secret = false
required = true
consumer = "app (auth)"
description = "RS256 public key (PEM) verifying access tokens. Public half of JWT_PRIVATE_KEY."

[[key]]
name = "JWT_REFRESH_PRIVATE_KEY"
provenance = "generated"
secret = true
required = true
consumer = "app (auth)"
description = "RS256 private key (PEM) signing refresh tokens. Minted by `npm run generate-keys`."

[[key]]
name = "JWT_REFRESH_PUBLIC_KEY"
provenance = "generated"
secret = false
required = true
consumer = "app (auth)"
description = "RS256 public key (PEM) verifying refresh tokens. Public half of JWT_REFRESH_PRIVATE_KEY."

# ---------------------------------------------------------------------------
# Provider-produced: a provider hands these back (GitHub App, rauthy clients).
# ---------------------------------------------------------------------------

[[key]]
name = "GITHUB_APP_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "app (github app)"
description = "Numeric id of the statecraft GitHub App. Not sensitive, but injected as an Encore secret alongside its private key."

[[key]]
name = "GITHUB_APP_PRIVATE_KEY_B64"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (github app)"
description = "Base64 of the statecraft GitHub App private key (PEM). Mints short-lived per-installation tokens (spec 004)."

[[key]]
name = "GITHUB_WEBHOOK_SECRET"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (github webhooks)"
description = "Secret GitHub signs App webhook deliveries with; the webhook endpoint verifies it. Returned by the App manifest conversion."

[[key]]
name = "OIDC_SPA_CLIENT_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "app (spa auth), webapp"
description = "Public client id of the rauthy SPA client (authorization_code + PKCE) the governance UI logs in with."

[[key]]
name = "OIDC_M2M_CLIENT_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "app (m2m)"
description = "Client id of the rauthy machine-to-machine client (client_credentials)."

[[key]]
name = "OIDC_M2M_CLIENT_SECRET"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (m2m)"
description = "Client secret paired with OIDC_M2M_CLIENT_ID."

[[key]]
name = "RAUTHY_CLIENT_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "app (oidc login)"
description = "Client id of the rauthy confidential client the control plane's server-side OIDC login uses."

[[key]]
name = "RAUTHY_CLIENT_SECRET"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (oidc login)"
description = "Client secret paired with RAUTHY_CLIENT_ID. Injected as an Encore secret (infra.config.json)."

[[key]]
name = "RAUTHY_ADMIN_TOKEN"
provenance = "provider-produced"
secret = true
required = true
consumer = "seed-rauthy job"
description = "Rauthy admin API key in the form <name>$<secret>. The seed job uses it to converge OIDC clients, scopes, and upstream providers."

[[key]]
name = "GRAFANA_OIDC_CLIENT_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "grafana"
description = "Client id of the rauthy client Grafana authenticates against (Grafana's sole auth path is rauthy generic_oauth)."

[[key]]
name = "GRAFANA_OIDC_CLIENT_SECRET"
provenance = "provider-produced"
secret = true
required = true
consumer = "grafana"
description = "Client secret paired with GRAFANA_OIDC_CLIENT_ID."

# ---------------------------------------------------------------------------
# Derived: computed from another value. The operator .env lists them
# explicitly; they must equal the formula below.
# ---------------------------------------------------------------------------

[[key]]
name = "APP_BASE_URL"
provenance = "derived"
secret = false
required = true
consumer = "app, rauthy redirect"
description = "https://<DOMAIN>. The control plane's own base URL."

[[key]]
name = "RAUTHY_URL"
provenance = "derived"
secret = false
required = true
consumer = "app, grafana, rauthy"
description = "https://auth.<DOMAIN>. The rauthy issuer host."

# ---------------------------------------------------------------------------
# Fleet image pull.
# ---------------------------------------------------------------------------

[[key]]
name = "FLEET_IMAGE_PULL_SECRET"
provenance = "derived"
secret = true
required = true
consumer = "fleet (image pull)"
description = "Base64 dockerconfigjson (derived from GHCR_PAT) that fleet attaches to placed pods so they can pull private GHCR images."
