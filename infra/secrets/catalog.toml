# infra/secrets/catalog.toml
#
# The single documented source for every secret and config value the
# statecraft platform (spec 010) needs on the operator host and in the
# cluster. It holds NAMES, DESCRIPTIONS, OWNERSHIP, REQUIRED/OPTIONAL, and the
# CONSUMER of each value. It holds NO VALUES.
#
# From this catalog:
#   - `infra/hetzner/.env.example` is generated (committed, documented).
#   - the operator `.env` at ~/.config/statecrafting/infra/hetzner/.env is
#     validated (missing required keys and unknown keys both fail).
#   - the SOPS-encrypted cluster secrets take their key set (every `secret`
#     key is what Flux decrypts in-cluster).
#   - agreement with spec 002's `infra.config.json` is enforced: every secret
#     Encore injects there must be declared here.
#
# Regenerate / validate with:
#   npm run secrets:example     # rewrite infra/hetzner/.env.example
#   npm run secrets:validate    # validate the operator .env against this
#   npm run secrets:check       # agreement with infra.config.json (CI gate)
#
# provenance is one of:
#   user-supplied     the operator provides it (tokens, domain, upstream creds)
#   generated         minted with crypto/rand or `npm run generate-keys`
#   provider-produced a provider hands it back (GitHub App, rauthy OIDC client)
#   derived           computed from another value (the sole survivor is the
#                     dockerconfigjson built from GHCR_PAT; the DOMAIN-derived
#                     service URLs were dropped, see the amendment below)
#
# `group` ties optional keys into an all-or-nothing set: if any member is set,
# every member must be set; if none are set, the group is skipped as optional.
#
# ---------------------------------------------------------------------------
# Amended 2026-07-20 to the verified image behavior (spec 010 section 2.1,
# closing spec 009 checkpoint 1, on explicit operator authorization).
#
# The control-plane image is embedded-rauthy and self-seeds: `first-boot.mjs`
# generates both RS256 keypairs, the OIDC client secret, the rauthy admin
# password, `ENC_KEYS`, and the hiqlite secrets into the `/data` volume, and
# the entrypoint unconditionally exports five of them from `/data` immediately
# before starting the app. The catalog previously declared roughly a dozen
# keys whose only claimed consumer was material the container now mints for
# itself. Fourteen were dropped; the rest carry one of three honest statuses,
# which the `consumer` field states:
#
#   1. A real consumer today (the cluster, the pod Secret, or the seeder Job).
#   2. Declared for Encore, satisfied in-container. `required = false`, and
#      INJECTING IT IS FORBIDDEN, not merely redundant: the entrypoint
#      overwrites it and a Secret key that reads as configured while having no
#      effect is the failure mode this amendment removes (spec 009 sec 2.2).
#   3. Held against a named upstream gap. No consumer today, kept because the
#      operator holds provisioned credentials and the gap has an owner
#      (spec 009 sec 4.8).
#
# Only SIX keys are genuinely required from a deploy and belong on the pod
# Secret: GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY_B64, GITHUB_WEBHOOK_SECRET,
# FLEET_S3_RESTIC_PASSWORD, FLEET_S3_ACCESS_KEY_ID, FLEET_S3_SECRET_ACCESS_KEY.
#
# The PLATFORM_S3_* group is NOT among them and must not reach the app pod: it
# belongs to the /data backup CronJob's own Secret (spec 009 section 4.3).
# ---------------------------------------------------------------------------

schema_version = 1
domain = "statecraft.ing"  # informational; the live value is DOMAIN in .env

# ---------------------------------------------------------------------------
# User-supplied: the operator provides these.
# ---------------------------------------------------------------------------

[[key]]
name = "DOMAIN"
provenance = "user-supplied"
secret = false
required = true
consumer = "cluster, cert-manager, app"
description = "Base apex domain the platform serves under (statecraft.ing). Every service host is a subdomain of it."

[[key]]
name = "LETSENCRYPT_EMAIL"
provenance = "user-supplied"
secret = false
required = true
consumer = "cert-manager"
description = "Registration email for the Let's Encrypt ACME accounts (both ClusterIssuers)."

[[key]]
name = "HCLOUD_TOKEN"
provenance = "user-supplied"
secret = true
required = true
consumer = "hetzner-k3s, hcloud-ccm, hcloud-csi"
description = "Hetzner Cloud API token with read+write on the target project. Provisions nodes, load balancers, and CSI volumes."

[[key]]
name = "CLOUDFLARE_DNS_API_TOKEN"
provenance = "user-supplied"
secret = true
required = true
consumer = "cert-manager (DNS-01 solver)"
description = "Cloudflare API token scoped Zone.DNS:Edit on the statecraft.ing zone. Used by the DNS-01 ACME solver to prove control of every host."

[[key]]
name = "GHCR_PAT"
provenance = "user-supplied"
secret = true
required = true
consumer = "image pull (ghcr), fleet"
description = "GitHub PAT with read:packages for pulling private GHCR images (the control-plane image and stamped app images)."

[[key]]
name = "FLEET_BASE_DOMAIN"
provenance = "user-supplied"
secret = false
required = true
consumer = "fleet (plain env on the pod, not a Secret key)"
description = "Base domain fleet places stamped single-container apps under (deployd.xyz). Distinct from DOMAIN, which is the control plane's own."

[[key]]
name = "FLEET_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
consumer = "fleet (restic backups); one of the six pod Secret keys"
description = "Access key for the Hetzner Object Storage bucket that holds the fleet's restic backups of per-app volumes. Nothing in the image can mint it, so the deploy must supply it (spec 009 section 2.2)."

[[key]]
name = "FLEET_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
consumer = "fleet (restic backups); one of the six pod Secret keys"
description = "Secret key paired with FLEET_S3_ACCESS_KEY_ID."

# The PLATFORM_S3_* group below backs up the CONTROL PLANE's own /data volume,
# which spec 009 section 4.3 calls the identity plane: both signing keypairs,
# the OIDC client secret, and rauthy's entire hiqlite database of users, roles,
# and clients. It is deliberately a separate credential set from FLEET_S3_*,
# which protects tenant app volumes. Spec 009 section 4.3 rule 2 originally
# proposed reusing the fleet's credentials; that was rejected on 2026-07-20
# because it would encrypt the platform's unreconstructible identity material
# under the same repository password as tenant data, and hand any holder of a
# tenant-scope credential the platform's identity backup.
#
# These three are NOT in infra.config.json and must never reach the app pod:
# their consumer is a restic CronJob, a separate workload with its own Secret,
# on the same reasoning that keeps the seeder Job's credentials off the pod
# (spec 009 section 4.5).
#
# NOTE ON `required` FOR GROUPED KEYS. `required = true` on a key that also
# carries a `group` does NOT make it mandatory. The validator skips grouped
# keys in its standalone-required pass and checks the group as all-or-nothing
# instead (catalog.ts, the two loops in validateEnv), so all three of these
# absent is silent, while one or two set is an error. `required` here means
# "required IF the group is used", matching rauthy_s3. This matters because
# spec 009 section 4.3 rule 2 makes the /data backup a GO-LIVE gate: passing
# `npm run secrets:validate` is not evidence the backup is configured, and
# the operator checkpoint is what enforces it.

[[key]]
name = "PLATFORM_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
group = "platform_s3"
consumer = "the control plane /data backup CronJob (spec 009 section 4.3 rule 2); never the app pod"
description = "Access key for the Hetzner Object Storage bucket holding restic backups of the control plane's own /data volume."

[[key]]
name = "PLATFORM_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
group = "platform_s3"
consumer = "the control plane /data backup CronJob (spec 009 section 4.3 rule 2); never the app pod"
description = "Secret key paired with PLATFORM_S3_ACCESS_KEY_ID."

[[key]]
name = "PLATFORM_S3_RESTIC_PASSWORD"
provenance = "generated"
secret = true
required = true
group = "platform_s3"
consumer = "the control plane /data backup CronJob (spec 009 section 4.3 rule 2); never the app pod"
description = "Restic repository password encrypting the control plane's /data backups. Losing BOTH this and the volume is unrecoverable: spec 009 section 4.3 states the volume is not reconstructible from git, and this password is the only thing that decrypts its backup. Custody belongs with the break-glass material, not with the fleet's credentials."

[[key]]
name = "OBJECT_STORAGE_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
consumer = "encore object_storage"
description = "Access key for the statecraft-encore-object-storage Hetzner bucket, addressed by Encore's s3 object_storage backend. Replaces the dropped in-cluster minio."

[[key]]
name = "OBJECT_STORAGE_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
consumer = "encore object_storage"
description = "Secret key paired with OBJECT_STORAGE_S3_ACCESS_KEY_ID."

# Held against a named upstream gap: the embedded rauthy has no backup target.
# The entrypoint exports no S3 configuration to the rauthy process, so nothing
# reads this pair today (spec 009 section 4.8 item 2). Kept, and demoted to an
# optional all-or-nothing group, because the bucket and its credentials are
# really provisioned and the interim volume-level backup (spec 009 section 4.3
# rule 2) does not replace rauthy's native hiqlite backups.
[[key]]
name = "RAUTHY_S3_ACCESS_KEY_ID"
provenance = "user-supplied"
secret = true
required = true
group = "rauthy_s3"
consumer = "none today; held for the chassis change that wires rauthy hiqlite S3 backups (spec 009 section 4.8 item 2)"
description = "Access key for the Hetzner Object Storage bucket that would hold rauthy's hiqlite database backups. Unwired: the entrypoint passes the rauthy process no S3 configuration."

[[key]]
name = "RAUTHY_S3_SECRET_ACCESS_KEY"
provenance = "user-supplied"
secret = true
required = true
group = "rauthy_s3"
consumer = "none today; held for the chassis change that wires rauthy hiqlite S3 backups (spec 009 section 4.8 item 2)"
description = "Secret key paired with RAUTHY_S3_ACCESS_KEY_ID."

# Held against a named upstream gap: the embedded rauthy has no mail transport.
# The entrypoint exports no SMTP configuration, so password reset and email
# verification do not work and no member of this group has a consumer today
# (spec 009 section 4.8 item 1). Kept because the operator holds a real Gmail
# app password and the group is already optional as a whole.
[[key]]
name = "SMTP_URL"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "none today; held for the chassis change that wires rauthy SMTP (spec 009 section 4.8 item 1)"
description = "SMTP host for rauthy email (smtp.gmail.com). Hetzner blocks port 465; use 587 with STARTTLS."

[[key]]
name = "SMTP_PORT"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "none today; held for the chassis change that wires rauthy SMTP (spec 009 section 4.8 item 1)"
description = "SMTP port (587 for STARTTLS)."

[[key]]
name = "SMTP_USERNAME"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "none today; held for the chassis change that wires rauthy SMTP (spec 009 section 4.8 item 1)"
description = "SMTP auth username."

[[key]]
name = "SMTP_PASSWORD"
provenance = "user-supplied"
secret = true
required = true
group = "smtp"
consumer = "none today; held for the chassis change that wires rauthy SMTP (spec 009 section 4.8 item 1)"
description = "SMTP auth password (a Gmail app password, not the account password)."

[[key]]
name = "SMTP_FROM"
provenance = "user-supplied"
secret = false
required = true
group = "smtp"
consumer = "none today; held for the chassis change that wires rauthy SMTP (spec 009 section 4.8 item 1)"
description = "From header for platform email (Admin <admin@statecraft.ing>)."

# Optional GitHub upstream OAuth provider (rauthy federated login). All-or-nothing.
[[key]]
name = "GITHUB_UPSTREAM_CLIENT_ID"
provenance = "user-supplied"
secret = false
required = true
group = "github_upstream"
consumer = "seed-rauthy Job (spec 009 section 4.5); its own Secret, never the app pod"
description = "Client id of the GitHub OAuth App rauthy federates to for GitHub login. rauthy 0.36 has no declarative bootstrap for upstream providers, so the seeder creates it through POST /auth/v1/providers/create."

[[key]]
name = "GITHUB_UPSTREAM_CLIENT_SECRET"
provenance = "user-supplied"
secret = true
required = true
group = "github_upstream"
consumer = "seed-rauthy Job (spec 009 section 4.5); its own Secret, never the app pod"
description = "Client secret paired with GITHUB_UPSTREAM_CLIENT_ID."

# Optional Google upstream OAuth provider (rauthy federated login). All-or-nothing.
[[key]]
name = "GOOGLE_UPSTREAM_CLIENT_ID"
provenance = "user-supplied"
secret = false
required = true
group = "google_upstream"
consumer = "seed-rauthy Job, once it converges a second provider; spec 009 section 4.5 specifies only the GitHub one"
description = "Client id of the Google OAuth client rauthy federates to for Google login. The seeder pass that exists on paper converges GitHub only, so this group is held rather than live."

[[key]]
name = "GOOGLE_UPSTREAM_CLIENT_SECRET"
provenance = "user-supplied"
secret = true
required = true
group = "google_upstream"
consumer = "seed-rauthy Job, once it converges a second provider; spec 009 section 4.5 specifies only the GitHub one"
description = "Client secret paired with GOOGLE_UPSTREAM_CLIENT_ID."

# ---------------------------------------------------------------------------
# Generated: minted with crypto/rand or `npm run generate-keys`.
# ---------------------------------------------------------------------------

[[key]]
name = "POSTGRES_PASSWORD"
provenance = "generated"
secret = true
required = true
consumer = "postgres, app (CoreLedger driver)"
description = "Password for the statecraft Postgres role. CoreLedger runs the Postgres driver against it (spec 003). Delivered to the cluster as a SOPS secret and reached by the app through ENRAHITU_LEDGER_URL."

[[key]]
name = "FLEET_S3_RESTIC_PASSWORD"
provenance = "generated"
secret = true
required = true
consumer = "fleet (restic backups); one of the six pod Secret keys"
description = "Restic repository password encrypting the fleet's per-app volume backups of TENANT apps. Renamed from RESTIC_PASSWORD on 2026-07-20 to disambiguate it from PLATFORM_S3_RESTIC_PASSWORD, which protects the control plane's own /data volume; an unqualified name could not distinguish the two backup domains. Nothing in the image can mint it, so the deploy must supply it (spec 009 section 2.2). The addon passes the value into the backup Job as restic's own RESTIC_PASSWORD env var, which is restic's CLI contract and is not renamed."

# The four JWT PEMs below are DECLARED FOR ENCORE, SATISFIED IN-CONTAINER.
# `first-boot.mjs` generates both RS256 keypairs into /data/keys/ and the
# entrypoint exports all four from there immediately before starting the app,
# so a value injected by the deploy is overwritten in the same shell. They stay
# in the catalog because `infra.config.json` declares them and `npm run
# secrets:check` requires every Encore secret to be catalogued, and because
# they are the material `npm run generate-keys` mints for a LOCAL run. They are
# not required from the operator, and must not appear on the pod Secret.
[[key]]
name = "JWT_PRIVATE_KEY"
provenance = "generated"
secret = true
required = false
consumer = "local dev run (npm run generate-keys); in-container it is self-generated, so injecting it is forbidden"
description = "RS256 private key (PEM) signing access tokens. Locally it is read from keys/access-private.pem by the dev fallback in backend/lib/secrets.ts; in the container the entrypoint exports it from /data/keys/."

[[key]]
name = "JWT_PUBLIC_KEY"
provenance = "generated"
secret = false
required = false
consumer = "local dev run (npm run generate-keys); in-container it is self-generated, so injecting it is forbidden"
description = "RS256 public key (PEM) verifying access tokens. Public half of JWT_PRIVATE_KEY."

[[key]]
name = "JWT_REFRESH_PRIVATE_KEY"
provenance = "generated"
secret = true
required = false
consumer = "local dev run (npm run generate-keys); in-container it is self-generated, so injecting it is forbidden"
description = "RS256 private key (PEM) signing refresh tokens. Locally it is read from keys/refresh-private.pem; in the container the entrypoint exports it from /data/keys/."

[[key]]
name = "JWT_REFRESH_PUBLIC_KEY"
provenance = "generated"
secret = false
required = false
consumer = "local dev run (npm run generate-keys); in-container it is self-generated, so injecting it is forbidden"
description = "RS256 public key (PEM) verifying refresh tokens. Public half of JWT_REFRESH_PRIVATE_KEY."

# ---------------------------------------------------------------------------
# Provider-produced: a provider hands these back (GitHub App, rauthy clients).
# ---------------------------------------------------------------------------

[[key]]
name = "GITHUB_APP_ID"
provenance = "provider-produced"
secret = false
required = true
consumer = "app (github app); one of the six pod Secret keys"
description = "Numeric id of the statecraft GitHub App. Not sensitive, but injected as an Encore secret alongside its private key."

[[key]]
name = "GITHUB_APP_PRIVATE_KEY_B64"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (github app); one of the six pod Secret keys"
description = "Base64 of the statecraft GitHub App private key (PEM). Mints short-lived per-installation tokens (spec 004)."

[[key]]
name = "GITHUB_WEBHOOK_SECRET"
provenance = "provider-produced"
secret = true
required = true
consumer = "app (github webhooks); one of the six pod Secret keys"
description = "Secret GitHub signs App webhook deliveries with; the webhook endpoint verifies it. Returned by the App manifest conversion."

# Declared for Encore, satisfied in-container, exactly like the JWT PEMs above.
[[key]]
name = "RAUTHY_CLIENT_SECRET"
provenance = "provider-produced"
secret = true
required = false
consumer = "local dev run (npm run dev:idp-secret); in-container it is self-generated, so injecting it is forbidden"
description = "Client secret of the confidential OIDC client the control plane logs in through. first-boot.mjs mints it into /data/keys/rauthy-client-secret and seeds the same value into the rauthy client bootstrap, and the entrypoint exports it from there. The client id is hardcoded to `enrahitu` by the entrypoint and is no longer a catalog key."

[[key]]
name = "RAUTHY_ADMIN_TOKEN"
provenance = "provider-produced"
secret = true
required = false
consumer = "seed-rauthy Job (spec 009 section 4.5); its own Secret, never the app pod"
description = "Rauthy admin API key in the form <name>$<secret>, used by the seeder to create the GitHub upstream provider. Only the provider needs the API: the OIDC client is seeded declaratively at first boot and scopes are not converged at all. Not required yet, because first-boot.mjs does not compose api_keys.json (spec 009 section 4.8 item 3), so rauthy has not handed this value back."

# ---------------------------------------------------------------------------
# Derived: computed from another value. The operator .env lists them
# explicitly. The two URL formulas that lived here (APP_BASE_URL and
# RAUTHY_URL) are gone with their consumers: no code reads either, and the
# issuer is now same-origin and derived by the entrypoint from
# ENRAHITU_PUBLIC_URL (spec 009 section 2.4).
# ---------------------------------------------------------------------------

[[key]]
name = "FLEET_IMAGE_PULL_SECRET"
provenance = "derived"
secret = true
required = true
consumer = "fleet (image pull)"
description = "Base64 dockerconfigjson (derived from GHCR_PAT) that fleet attaches to placed pods so they can pull private GHCR images."
