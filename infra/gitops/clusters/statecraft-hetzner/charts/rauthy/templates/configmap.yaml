apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rauthy.fullname" . }}-config
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
data:
  config.toml: |
    # Minimal config — most settings provided via environment variables.
    # Rauthy >= 0.35.0 requires this file to exist and include [server].
    #
    # Upstream auth providers are NOT configured here. Rauthy 0.35 stores
    # providers in its hiqlite DB and exposes them via the admin API only
    # (there is no `[[upstream_auth_provider]]` TOML section in
    # RauthyConfig.Vars — unknown keys are silently ignored). The statecraft
    # Rauthy seeder (spec 106 FR-002) creates and maintains providers via
    # POST /auth/v1/providers/create and PUT /auth/v1/providers/{id}.

    [server]
    pub_url = {{ include "rauthy.pubUrl" . | quote }}
