apiVersion: v1
kind: Service
metadata:
  name: {{ include "rauthy.headlessName" . }}
  labels:
    {{- include "rauthy.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "rauthy.selectorLabels" . | nindent 4 }}
  ports:
    - name: raft
      port: 8100
      targetPort: 8100
      protocol: TCP
    - name: hql-api
      port: 8200
      targetPort: 8200
      protocol: TCP
