# Flux Kustomization: the manifests tier (ClusterIssuers) (spec 010).
#
# dependsOn infrastructure, which gates Ready on the cert-manager HelmRelease
# healthCheck, so cert-manager.io/v1 CRDs are present before the ClusterIssuer
# apply hits server-side-apply dry-run. `wait: true` ties this tier's Ready to
# the ClusterIssuers actually reaching Ready (their ACME account registers),
# not merely to the YAML applying.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: manifests
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  path: ./infra/gitops/clusters/statecraft-hetzner/manifests
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure
  wait: true
