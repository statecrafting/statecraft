# Flux Kustomization: the SOPS secret tier (spec 010).
#
# This is the piece the OAP reference left as a placeholder: a real
# `decryption` block that makes Flux decrypt the committed *.sops.yaml in
# cluster from the `sops-age` Secret bootstrapped once into flux-system. That
# is what spec 010 acceptance means by "a Secret materializing from ciphertext
# in git".
#
# dependsOn namespaces so the target namespaces (cert-manager, rauthy-system,
# monitoring, statecraft-system) exist before the Secrets apply.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  path: ./infra/gitops/clusters/statecraft-hetzner/secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: namespaces
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  wait: true
