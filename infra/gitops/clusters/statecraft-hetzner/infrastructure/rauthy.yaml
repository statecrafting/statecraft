# rauthy HelmRelease (spec 010) - the platform IdP, fresh (not migrated).
#
# References the vendored in-tree chart at
# `./infra/gitops/clusters/statecraft-hetzner/charts/rauthy` through the
# bootstrap `flux-system` GitRepository, with `reconcileStrategy: Revision` so
# chart edits land on the next git revision without a Chart.yaml bump.
#
# Secret dependency: `rauthy-secrets` (raft-secret, api-secret, admin-password,
# enc-keys, enc-key-active) and `rauthy-smtp-secret` (from, url, port,
# username, password, starttls_only) are SOPS-decrypted by the `secrets` tier.
# With `smtp.enabled: true` the StatefulSet references rauthy-smtp-secret and
# will not start until it exists; the `secrets` tier applies before this HR
# has its secrets, and Flux retries until then.
#
# Certs: the ingress uses the DNS-01 Cloudflare ClusterIssuer (not HTTP-01) so
# `auth.statecraft.ing`'s cert issues before DNS is pointed at the cluster.
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rauthy
  namespace: rauthy-system
spec:
  interval: 1h
  chart:
    spec:
      chart: ./infra/gitops/clusters/statecraft-hetzner/charts/rauthy
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    timeout: 5m
    remediation:
      retries: 3
  values:
    replicas: 1

    proxyMode: true
    # Pod CIDR (10.244.0.0/16, verified on the live cluster) + Cloudflare IPv4
    # ranges (https://www.cloudflare.com/ips-v4/): trust these so rauthy reads
    # the real client IP from X-Forwarded-For across rotating Cloudflare edges.
    trustedProxies:
      - "10.244.0.0/16"
      - "173.245.48.0/20"
      - "103.21.244.0/22"
      - "103.22.200.0/22"
      - "103.31.4.0/22"
      - "141.101.64.0/18"
      - "108.162.192.0/18"
      - "190.93.240.0/20"
      - "188.114.96.0/20"
      - "197.234.240.0/22"
      - "198.41.128.0/17"
      - "162.158.0.0/15"
      - "104.16.0.0/13"
      - "104.24.0.0/14"
      - "172.64.0.0/13"
      - "131.0.72.0/22"

    persistence:
      size: 2Gi

    oidc:
      issuer: "https://auth.statecraft.ing/auth/v1/"

    ingress:
      host: "auth.statecraft.ing"
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod-dns01-cloudflare"
        nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    bootstrap:
      adminEmail: "admin@statecraft.ing"

    smtp:
      enabled: true
