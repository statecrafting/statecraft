# Platform metrics stack (kube-prometheus-stack HelmRelease, spec 010).
#
# One Prometheus with three roles: RECEIVES statecraft's Encore remote_write
# (Encore's exporter pushes; no scrape endpoint), SCRAPES pull targets
# (ingress-nginx, Flux, node-exporter, kube-state-metrics), and SERVES Grafana.
# The unauthenticated remote-write receiver is reachable only in-cluster; it is
# never exposed at ingress.
#
# Grafana's sole auth path is rauthy OIDC (generic_oauth); the local login form
# and initial admin are disabled. Grafana consumes the `grafana-oidc` Secret
# (GF_AUTH_GENERIC_OAUTH_CLIENT_ID/_SECRET) from the SOPS `secrets` tier; until
# it exists the Grafana pod blocks while the data plane is already live.
#
# Alertmanager and the ~100 bundled default rules stay OFF (alerting policy is
# a later spec, not a chart default).
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: prometheus-community
  namespace: flux-system
spec:
  interval: 24h
  url: https://prometheus-community.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 24h
  install:
    crds: CreateReplace
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 10m
    remediation:
      retries: 3
  values:
    # Deterministic short names: the Prometheus Service becomes
    # `monitoring-prometheus`, the literal DNS name Encore's remote_write_url
    # points at. cleanPrometheusOperatorObjectNames keeps operator-side PVC
    # names under hcloud's 63-char volume-label cap.
    fullnameOverride: monitoring
    cleanPrometheusOperatorObjectNames: true

    defaultRules:
      create: false
    alertmanager:
      enabled: false

    # k3s embeds these without separately reachable metrics endpoints; leaving
    # them on would ship permanently-down targets.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false

    prometheusOperator:
      admissionWebhooks:
        enabled: false
      tls:
        enabled: false

    prometheus:
      prometheusSpec:
        enableRemoteWriteReceiver: true
        enableAdminAPI: false
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: hcloud-volumes
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        additionalScrapeConfigs:
          - job_name: statecraft-annotated-pods
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - flux-system
                    - statecraft-system
                    - ingress-nginx
            relabel_configs:
              - source_labels:
                  - __meta_kubernetes_pod_annotation_prometheus_io_scrape
                action: keep
                regex: "true"
              - source_labels:
                  - __meta_kubernetes_pod_annotation_prometheus_io_path
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels:
                  - __address__
                  - __meta_kubernetes_pod_annotation_prometheus_io_port
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod

    grafana:
      enabled: true
      defaultDashboardsEnabled: false
      envFromSecret: grafana-oidc
      persistence:
        enabled: true
        size: 2Gi
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          # DNS-01 issuer (not HTTP-01) so grafana.statecraft.ing's cert issues
          # before DNS is pointed at the cluster.
          cert-manager.io/cluster-issuer: letsencrypt-prod-dns01-cloudflare
        hosts:
          - grafana.statecraft.ing
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.statecraft.ing
      grafana.ini:
        server:
          root_url: https://grafana.statecraft.ing
        security:
          disable_initial_admin_creation: true
        auth:
          disable_login_form: true
        auth.anonymous:
          enabled: false
        auth.basic:
          enabled: false
        auth.generic_oauth:
          enabled: true
          name: Rauthy
          auto_login: true
          use_pkce: true
          allow_sign_up: true
          scopes: openid email profile
          auth_url: https://auth.statecraft.ing/auth/v1/oidc/authorize
          token_url: https://auth.statecraft.ing/auth/v1/oidc/token
          api_url: https://auth.statecraft.ing/auth/v1/oidc/userinfo
          # The operator carries rauthy's built-in `rauthy_admin` role; map it
          # to Grafana Admin, everyone else to Viewer. Refine once the app
          # seeds a platform_role custom scope (spec 009). Not strict, so a
          # missing role degrades to Viewer rather than a failed login.
          role_attribute_strict: false
          role_attribute_path: >-
            contains(roles[*], 'rauthy_admin') && 'Admin' ||
            contains(roles[*], 'admin') && 'Admin' || 'Viewer'
