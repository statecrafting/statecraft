# kubernetes-reflector HelmRelease (spec 010).
#
# Clones annotated Secrets across namespaces. The tenant wildcard TLS Secret
# (spec 004 territory, later) carries reflector annotations so cert-manager's
# generated Secret auto-clones into every tenant namespace. Reflector defines
# and consumes no CRDs, so it needs no dependsOn against cert-manager.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: emberstack
  namespace: flux-system
spec:
  interval: 24h
  url: https://emberstack.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reflector
  namespace: kube-system
spec:
  interval: 1h
  chart:
    spec:
      chart: reflector
      version: "9.1.6"
      sourceRef:
        kind: HelmRepository
        name: emberstack
        namespace: flux-system
      interval: 24h
  install:
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    timeout: 5m
    remediation:
      retries: 3
