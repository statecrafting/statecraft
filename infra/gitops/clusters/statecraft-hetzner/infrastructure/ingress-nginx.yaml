# ingress-nginx HelmRelease (spec 010).
#
# DaemonSet + hostPort (NOT a LoadBalancer Service): tenant/platform traffic
# reaches the nodes directly on hostPort 80/443, and DNS points at the node
# IPs. `use-forwarded-headers` + `compute-full-forwarded-for` let backends see
# the real client IP through the Cloudflare -> nginx X-Forwarded-For chain.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes.github.io/ingress-nginx
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 1h
  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 24h
  install:
    timeout: 5m
    remediation:
      retries: 3
  upgrade:
    timeout: 5m
    remediation:
      retries: 3
  values:
    controller:
      kind: DaemonSet
      hostPort:
        enabled: true
      service:
        type: ClusterIP
      metrics:
        enabled: true
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10254"
      config:
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
