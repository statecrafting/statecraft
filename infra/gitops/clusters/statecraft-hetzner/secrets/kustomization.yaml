apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# SOPS-encrypted Secret manifests. The `secrets` Flux Kustomization
# (../secrets-kustomization.yaml) reconciles this path with a
# `decryption: { provider: sops, secretRef: sops-age }` block, so Flux
# decrypts these in-cluster from the age key bootstrapped into flux-system.
#
# The rauthy secrets left with the cluster rauthy (spec 010 section 2.1); the
# embedded rauthy's key material is still catalogued, and spec 009 re-encrypts
# it from the operator .env into the control-plane namespace.
resources:
  - cloudflare-api-token.sops.yaml
  - statecraft-postgres.sops.yaml
