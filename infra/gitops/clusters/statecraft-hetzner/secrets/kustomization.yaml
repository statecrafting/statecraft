apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# SOPS-encrypted Secret manifests. The `secrets` Flux Kustomization
# (../secrets-kustomization.yaml) reconciles this path with a
# `decryption: { provider: sops, secretRef: sops-age }` block, so Flux
# decrypts these in-cluster from the age key bootstrapped into flux-system.
#
# The rauthy secrets left with the cluster rauthy (spec 010 section 2.1); the
# embedded rauthy's key material is still catalogued, and spec 009 re-encrypts
# it from the operator .env into the control-plane namespace.
resources:
  - cloudflare-api-token.sops.yaml
  - statecraft-postgres.sops.yaml
  # The control plane's own Secrets (spec 009), added 2026-07-20. They live in
  # this tier rather than beside the spec 009 manifests because .sops.yaml's
  # creation rule matches only this directory and this is the only tier
  # carrying a `decryption:` block, which is what the comment above already
  # anticipated. statecraft-secrets holds the nine keys of spec 009 section
  # 2.2; statecraft-platform-backup holds the PLATFORM_S3_* group and is
  # mounted only on the /data backup CronJob, never on the app pod.
  - statecraft-secrets.sops.yaml
  - statecraft-platform-backup.sops.yaml
