# Flux Kustomization: the namespace tier. No dependencies; applied first so
# both the secrets tier (Secrets target these namespaces) and the
# infrastructure tier (HelmReleases install into them) can rely on them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: namespaces
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  path: ./infra/gitops/clusters/statecraft-hetzner/namespaces
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
