# Build + publish the stagecraft control-plane single-container image
# (spec 009). Unlike the enrahitu template, the toolchain is consumed as npm
# packages (@enrahitu/toolchain, @enrahitu/hiqlite-native): `npm ci` on a linux
# runner pulls the prebuilt linux Encore runtime / tsparser / hiqlite from the
# @enrahitu/*-linux-x64 optional-dependency packages, so there is no vendored
# Rust cross-build. Only stagecraft's OWN two addons (governance-native,
# fleet-native) build here, natively.
#
# amd64 only: the fleet cluster is x86-64. The runner is ubuntu-22.04 (glibc
# 2.35) so the natively-built addons link against a glibc no newer than the
# node:24-slim base image's bookworm (2.36) and load at runtime.
#
# NOTE: no /health smoke here. The control plane runs the Postgres driver
# (spec 003), so it cannot become healthy without a database; runtime
# verification happens in the deploy stage (spec 009) where Postgres exists.
# This job proves the image BUILDS and is pullable.
name: image

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: npm
      - name: Install protoc + cmake (native addon builds)
        run: sudo apt-get update -q && sudo apt-get install -y -q protobuf-compiler cmake
      # npm ci installs the linux platform packages
      # (@enrahitu/toolchain-linux-x64 -> encore-runtime.node + tsparser-encore,
      # @enrahitu/hiqlite-native-linux-x64-gnu -> the hiqlite .node).
      - run: npm ci
      - name: Build stagecraft's own addons (governance + fleet, native linux)
        run: npm run build:addon
      - name: Build the SPA (into backend/web/dist)
        run: npm run build:web
      - name: Build the app bundle (npm toolchain)
        run: npm run build:app
      - name: Stage the linux Encore runtime + docker infra config
        run: |
          set -euo pipefail
          cp node_modules/@enrahitu/toolchain-linux-x64/encore-runtime.node docker/encore-runtime.node
          node node_modules/@enrahitu/toolchain/lib/augment-infra.mjs \
            infra.config.json .encore/build/compile-result.json infra.config.docker.json
      - name: Build the base image (app + vendored-in-npm runtime)
        run: docker build -f docker/Dockerfile.base -t stagecraft-api:latest .
      - name: Build the final image (+ rauthy)
        run: docker build -f docker/Dockerfile --build-arg BASE_IMAGE=stagecraft-api:latest -t stagecraft:latest .
      - name: Report built image arch
        run: docker image inspect stagecraft:latest --format 'built stagecraft:latest ({{.Architecture}})'
      - name: Push to GHCR
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/stagecraft
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker tag stagecraft:latest "$IMAGE:${{ github.sha }}"
          docker tag stagecraft:latest "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
          if [ "${{ github.event_name }}" = "release" ]; then
            docker tag stagecraft:latest "$IMAGE:${{ github.event.release.tag_name }}"
            docker push "$IMAGE:${{ github.event.release.tag_name }}"
          fi
