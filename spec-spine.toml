# spec-spine.toml governs this repository. All keys are optional; an
# absent file behaves as the defaults for a single-Cargo-workspace repo.

[manifest]
metadata_namespace = "spec-spine"

[domains]
allowed = []   # empty: the `domain` field is free-text / disabled

[kind]
allowed = []   # empty: the `kind` field is free-text / disabled

[layout]
specs_dir     = "specs"
derived_dir   = ".derived"
standards_dir = "standards/spec"
# The governance (spec 008) and fleet (spec 006) napi addons are standalone
# Rust crates and npm packages. The app shell (spec 002) brings the root
# package.json (an Encore app, spec-spine key -> 002); the SPA is the frontend/
# package (spec 007, spec-spine key -> 007), matching the enrahitu chassis
# backend/ + frontend/ convention. The Encore toolchain and hiqlite addon are
# pinned @enrahitu/* dependencies, not in-tree packages, so they are not listed
# here.
standalone_rust_workspaces = ["addon/governance-native", "addon/fleet-native"]
standalone_npm_packages    = ["addon/governance-native", "addon/fleet-native", "frontend"]

[index]
# Governance surfaces beyond the always-hashed core. Service manifests are
# added as services land (spec 001 §3 service map).
extra_hashed_inputs = [
  "standards/**",
  ".github/workflows/**",
  ".claude/agents/**",
  ".claude/rules/**",
  ".claude/skills/**",
  ".claude/settings.json",
  ".mcp.json",
]

[coupling]
waiver_keyword = "Spec-Drift-Waiver:"
bypass_prefixes = ["**/README.md"]
